<div class="w-full min-w-0 max-w-full overflow-hidden rounded-lg border border-slate-700 bg-slate-900 shadow-soft" role="listbox">
  {% if matches %}
    <ul class="max-h-72 overflow-y-auto overflow-x-hidden py-1" role="list">
      {% for name, loc_id in matches.items() %}
      <li role="presentation">
        <button
          type="button"
          class="w-full min-w-0 max-w-full px-3 py-2 text-left text-sm text-slate-200 hover:bg-slate-800 hover:text-white focus:bg-slate-800 focus:text-white focus:outline-none"
          role="option"
          hx-on:mousedown="event.preventDefault()"
          hx-on:click='
            const results = this.closest(".search-results");
            const wrapper = results ? results.closest("[data-search-wrapper]") : null;
            const input = wrapper ? wrapper.querySelector("input[type=text]") : null;
            if (!input) return;

            htmx.trigger(input, "item-selected", {
              "val": "{{ loc_id }}",
              "label": {{ name | tojson }}
            });

            if (results) results.innerHTML = "";
            input.blur();
          '
          title="{{ name }}"
        >
          <span class="block truncate">{{ name }}</span>
        </button>
      </li>
      {% endfor %}
    </ul>
  {% else %}
    <div class="px-3 py-2 text-sm font-medium text-amber-300">No locations found</div>
  {% endif %}
</div>
