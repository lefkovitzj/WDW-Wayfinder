<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.APP_NAME if settings else "WDW Transit Optimizer" }}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="min-h-screen bg-base-200">

    <div class="navbar bg-primary text-primary-content shadow-lg">
        <div class="container mx-auto">
            <a class="btn btn-ghost text-xl font-bold" href="/">🏰 WDW Wayfinder</a>
        </div>
    </div>

    <main class="container mx-auto p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer footer-center p-4 text-base-content">
        <aside>
            <p>© 2026 Joseph Lefkovitz - WDW Transit Optimizer</p>
        </aside>
    </footer>

<script>
    document.addEventListener('click', function (event) {
        // 1. Find every result container currently on the page
        const allResultContainers = document.querySelectorAll('[id^="results-"], #final-results, #start-results');

        allResultContainers.forEach(container => {
            // 2. Check if the container is already empty (nothing to do)
            if (container.innerHTML.trim() === '') return;

            // 3. Find the input field that "owns" this container
            // We find the closest '.relative' wrapper and then the text input inside it
            const parentWrapper = container.closest('.relative');
            const associatedInput = parentWrapper ? parentWrapper.querySelector('input[type="text"]') : null;

            // 4. If the user clicked outside BOTH the container AND the input, kill it
            if (!container.contains(event.target) && event.target !== associatedInput) {
                container.innerHTML = '';
            }
        });
    });
</script>
<style>
    /* Ensure the results dropdown always stays on top of other form elements */
    [id^="results-"], #final-results, #start-results {
        z-index: 9999 !important;
        position: absolute;
        /* Adding a slight background blur and shadow helps it pop */
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    /* Optional: Prevent parent containers from overlapping the dropdowns */
    .form-control.relative {
        position: relative;
        z-index: auto;
    }

    /* Give the active searching field a slightly higher priority */
    .form-control.relative:focus-within {
        z-index: 50;
    }
</style>


</body>
</html>
