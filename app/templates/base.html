<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WDW Transit Optimizer{% endblock %}</title>

  <!-- Flowbite + Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            wdw: {
              navy: "#0B2545",
              navy2: "#13315C",
              gold: "#F4B400",
              teal: "#2A9D8F",
              sky: "#EAF4FF"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(11,37,69,.20)"
          }
        }
      }
    }
  </script>

  <style>
    body { background: #020617; } /* slate-950 */
    .wdw-brand-gradient { background: linear-gradient(135deg, #0B2545 0%, #13315C 55%, #2A9D8F 100%); }
  </style>

  {% block head_extras %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100">
  <!-- Top nav -->
  <nav class="fixed top-0 z-50 w-full border-b border-slate-800 bg-slate-900/95 backdrop-blur">
    <div class="px-4 py-3 lg:px-6">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button data-drawer-target="logo-sidebar" data-drawer-toggle="logo-sidebar" aria-controls="logo-sidebar" type="button"
            class="inline-flex items-center rounded-lg p-2 text-slate-500 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-wdw-gold sm:hidden">
            <span class="sr-only">Open sidebar</span>
            <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20"><path clip-rule="evenodd" fill-rule="evenodd" d="M2 4a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zm0 6a1 1 0 011-1h14a1 1 0 110 2H3a1 1 0 01-1-1zm1 5a1 1 0 100 2h14a1 1 0 100-2H3z"/></svg>
          </button>
          <span class="text-lg font-semibold text-wdw-navy">WDW Transit Optimizer</span>
        </div>
        <span class="rounded-full bg-wdw-sky px-3 py-1 text-xs font-semibold text-wdw-navy">Planner Dashboard</span>
      </div>
    </div>
  </nav>

  <!-- Sidebar -->
  <aside id="logo-sidebar" class="fixed left-0 top-0 z-40 h-screen w-64 -translate-x-full border-r border-slate-800 bg-slate-900 pt-16 transition-transform sm:translate-x-0" aria-label="Sidebar">
    <div class="h-full overflow-y-auto px-3 py-4">
      <div class="mb-4 rounded-xl p-4 text-white shadow-soft wdw-brand-gradient">
        <p class="text-xs uppercase tracking-wide text-white/80">Walt Disney World</p>
        <h2 class="text-lg font-bold">Transit Ops</h2>
      </div>

      <ul class="space-y-2 text-sm font-medium">
        <li>
          <a href="/" class="group flex items-center rounded-lg p-2 text-slate-200 hover:bg-slate-800">Dashboard</a>
        </li>
        <li>
          <a href="/about" class="group flex items-center rounded-lg p-2 text-slate-200 hover:bg-slate-800">About</a>
        </li>
        <li>
          <a href="/contribute" class="group flex items-center rounded-lg p-2 text-slate-200 hover:bg-slate-800">Contribute</a>
        </li>
        <li>
          <a href="/contact" class="group flex items-center rounded-lg p-2 text-slate-200 hover:bg-slate-800">Contact</a>
        </li>
      </ul>
    </div>
  </aside>

  <!-- Main -->
  <main class="mt-14 p-4 sm:ml-64 lg:p-6">
    {% block content %}{% endblock %}
  </main>

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
